<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>개발 공유 트리</title>
<style>
  :root{
    --ink:#171a24;          /* 사이드바 딥 잉크 */
    --ink-2:#1f2330;
    --line:#2c3141;         /* 트리 가이드선 */
    --side-fg:#c7ccd8;
    --side-dim:#767d90;
    --paper:#fbfaf7;        /* 본문 종이 */
    --paper-fg:#22252e;
    --paper-dim:#6a7080;
    --edge:#e7e4dc;
    --amber:#e0a63c;        /* 선택/강조 앰버 */
    --amber-soft:#f4e2bd;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    display:grid;
    grid-template-columns:340px 1fr;
    grid-template-rows:100%;
    font-family:var(--sans);
    color:var(--paper-fg);
    background:var(--paper);
    height:100dvh;
    overflow:hidden;
  }

  /* ---------- 사이드바 ---------- */
  aside{
    background:var(--ink);
    color:var(--side-fg);
    display:flex;flex-direction:column;
    min-height:0;
    border-right:1px solid #000;
  }
  .brand{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--ink-2);
  }
  .brand h1{
    margin:0;font-size:14px;font-weight:600;letter-spacing:.02em;
    font-family:var(--mono);color:#fff;
    display:flex;align-items:center;gap:8px;
  }
  .brand h1 .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex:none}
  .brand p{margin:6px 0 0;font-size:11.5px;color:var(--side-dim);font-family:var(--mono)}
  .search{padding:12px 16px;border-bottom:1px solid var(--ink-2)}
  .search input{
    width:100%;padding:8px 10px;border-radius:7px;border:1px solid var(--line);
    background:var(--ink-2);color:var(--side-fg);font-size:13px;font-family:var(--sans);
  }
  .search input::placeholder{color:var(--side-dim)}
  .search input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 2px rgba(224,166,60,.15)}

  .tree{flex:1;overflow-y:auto;padding:10px 8px 24px;font-family:var(--mono);font-size:13px;line-height:1.55}
  .tree::-webkit-scrollbar{width:9px}
  .tree::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px}

  .row{
    display:flex;align-items:center;gap:6px;white-space:nowrap;
    padding:3px 8px;border-radius:6px;cursor:pointer;user-select:none;
    color:var(--side-fg);
  }
  .row:hover{background:var(--ink-2)}
  .row .guide{color:var(--line);flex:none;letter-spacing:-1px}
  .row.folder .name{color:#eef0f5;font-weight:600}
  .row.folder .chev{color:var(--side-dim);flex:none;transition:transform .12s}
  .row.folder.collapsed .chev{transform:rotate(-90deg)}
  .row.doc .name{color:var(--side-fg)}
  .row.doc .meta{color:var(--side-dim);font-size:11px;margin-left:auto;padding-left:12px}
  .row.doc.active{background:rgba(224,166,60,.14);color:#fff}
  .row.doc.active .name{color:var(--amber-soft)}
  .row.doc.active::before{content:"";position:absolute}
  .row.doc.active .dot{color:var(--amber)}
  .hidden{display:none !important}
  .empty{color:var(--side-dim);padding:20px;font-size:12px;text-align:center;font-family:var(--sans)}

  /* ---------- 본문(뷰어) ---------- */
  main{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--paper)}
  .topbar{
    display:flex;align-items:center;gap:14px;
    padding:12px 20px;border-bottom:1px solid var(--edge);background:#fff;
    min-height:56px;
  }
  .topbar .burger{display:none;background:none;border:1px solid var(--edge);border-radius:7px;
    width:34px;height:34px;font-size:16px;cursor:pointer;flex:none}
  .topbar .title{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar .sub{font-size:11.5px;color:var(--paper-dim);font-family:var(--mono);margin-top:2px}
  .topbar .actions{margin-left:auto;display:flex;gap:8px;flex:none}
  .btn{
    font-family:var(--sans);font-size:12.5px;padding:7px 12px;border-radius:7px;
    border:1px solid var(--edge);background:#fff;color:var(--paper-fg);cursor:pointer;
    text-decoration:none;display:inline-flex;align-items:center;gap:6px;
  }
  .btn:hover{border-color:var(--amber);color:#8a5a00}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:var(--ink-2);color:#fff}

  .frame-wrap{flex:1;min-height:0;position:relative;background:var(--paper)}
  iframe{width:100%;height:100%;border:0;background:#fff}

  .welcome{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:40px;color:var(--paper-dim);
  }
  .welcome .mark{font-family:var(--mono);font-size:13px;color:var(--paper-dim);
    background:#fff;border:1px solid var(--edge);border-radius:10px;padding:18px 22px;max-width:440px;text-align:left;line-height:1.7}
  .welcome .mark b{color:var(--paper-fg)}
  .welcome h2{font-size:19px;color:var(--paper-fg);margin:0 0 8px;font-weight:600}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:10px 18px;border-radius:9px;font-size:13px;
    opacity:0;pointer-events:none;transition:all .25s;z-index:50;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ---------- 모바일 ---------- */
  @media (max-width:820px){
    body{grid-template-columns:1fr}
    aside{position:fixed;inset:0 auto 0 0;width:86%;max-width:340px;z-index:40;
      transform:translateX(-100%);transition:transform .22s;box-shadow:4px 0 24px rgba(0,0,0,.3)}
    body.nav-open aside{transform:translateX(0)}
    .topbar .burger{display:inline-flex;align-items:center;justify-content:center}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:35;opacity:0;pointer-events:none;transition:opacity .2s}
    body.nav-open .scrim{opacity:1;pointer-events:auto}
  }
  @media (min-width:821px){.scrim{display:none}}
</style>
</head>
<body>
  <aside>
    <div class="brand">
      <h1><span class="dot"></span>개발 공유 트리</h1>
      <p id="count">불러오는 중…</p>
    </div>
    <div class="search">
      <input id="q" type="search" placeholder="문서 검색…" autocomplete="off">
    </div>
    <nav class="tree" id="tree"></nav>
  </aside>

  <main>
    <div class="topbar">
      <button class="burger" id="burger" aria-label="목록">☰</button>
      <div style="min-width:0">
        <div class="title" id="docTitle">문서를 선택하세요</div>
        <div class="sub" id="docSub"></div>
      </div>
      <div class="actions" id="actions" style="display:none">
        <button class="btn" id="copyLink">🔗 링크 복사</button>
        <a class="btn primary" id="openTab" target="_blank" rel="noopener">↗ 새 탭</a>
      </div>
    </div>
    <div class="frame-wrap">
      <iframe id="viewer" title="문서 뷰어" style="display:none"></iframe>
      <div class="welcome" id="welcome">
        <div>
          <h2>왼쪽 트리에서 문서를 열어보세요</h2>
          <div class="mark">
            새 문서 추가 = <b>docs/ 폴더에 .html 넣고 push</b>.<br>
            트리는 <b>자동으로</b> 다시 그려집니다. 이 화면은 손댈 필요 없습니다.<br><br>
            폴더 = 트리 가지 · 파일명 앞 <b>01_</b> = 정렬 순서(화면엔 안 보임)
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="scrim" id="scrim"></div>
  <div class="toast" id="toast"></div>

<script>
const DOCS_BASE = "docs/";
let flatDocs = [];

const $ = s => document.querySelector(s);
const treeEl = $("#tree");

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function render(nodes, depth, prefix){
  let html = "";
  nodes.forEach((n, i) => {
    const last = i === nodes.length - 1;
    const branch = depth === 0 ? "" : (last ? "└─ " : "├─ ");
    const guide = prefix + branch;
    if (n.type === "folder"){
      html += `<div class="row folder" data-depth="${depth}">`
            + `<span class="guide">${esc(guide)}</span>`
            + `<span class="chev">▾</span>`
            + `<span class="name">${esc(n.label)}</span></div>`;
      const childPrefix = prefix + (depth === 0 ? "" : (last ? "   " : "│  "));
      html += `<div class="group">${render(n.children, depth+1, childPrefix)}</div>`;
    } else {
      flatDocs.push(n);
      html += `<div class="row doc" data-path="${esc(n.path)}" data-depth="${depth}" title="${esc(n.label)}">`
            + `<span class="guide">${esc(guide)}</span>`
            + `<span class="dot">◆</span>`
            + `<span class="name">${esc(n.label)}</span>`
            + `<span class="meta">${esc(n.updated||"")}</span></div>`;
    }
  });
  return html;
}

function open(path, push){
  const doc = flatDocs.find(d => d.path === path);
  if(!doc) return;
  const url = DOCS_BASE + path;
  $("#viewer").src = url;
  $("#viewer").style.display = "block";
  $("#welcome").style.display = "none";
  $("#docTitle").textContent = doc.label;
  $("#docSub").textContent = path + "  ·  수정 " + (doc.updated||"");
  $("#actions").style.display = "flex";
  $("#openTab").href = url;
  document.querySelectorAll(".row.doc").forEach(r =>
    r.classList.toggle("active", r.dataset.path === path));
  if(push) location.hash = encodeURIComponent(path);
  document.body.classList.remove("nav-open");
}

// 폴더 접기/펴기
treeEl.addEventListener("click", e => {
  const row = e.target.closest(".row");
  if(!row) return;
  if(row.classList.contains("folder")){
    row.classList.toggle("collapsed");
    const grp = row.nextElementSibling;
    if(grp && grp.classList.contains("group"))
      grp.classList.toggle("hidden", row.classList.contains("collapsed"));
  } else if(row.dataset.path){
    open(row.dataset.path, true);
  }
});

// 검색 필터
$("#q").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll(".row.doc").forEach(r => {
    const hit = !q || r.dataset.path.toLowerCase().includes(q)
             || r.querySelector(".name").textContent.toLowerCase().includes(q);
    r.classList.toggle("hidden", !hit);
  });
  // 검색 중엔 폴더/가이드선 숨겨 결과만 보이게
  document.querySelectorAll(".row.folder, .group").forEach(el =>
    el.classList.toggle("hidden", !!q));
  document.querySelectorAll(".row.doc .guide").forEach(g =>
    g.style.visibility = q ? "hidden" : "visible");
});

// 링크 복사
$("#copyLink").addEventListener("click", () => {
  navigator.clipboard.writeText(location.href).then(() => toast("링크가 복사됐습니다"));
});
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800);
}

// 모바일 네비
$("#burger").addEventListener("click", ()=>document.body.classList.toggle("nav-open"));
$("#scrim").addEventListener("click", ()=>document.body.classList.remove("nav-open"));

// 부팅
fetch("manifest.json?" + Date.now())
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(m => {
    treeEl.innerHTML = render(m.tree, 0, "");
    $("#count").textContent = `문서 ${m.count}개 · 자동 갱신`;
    const hash = decodeURIComponent(location.hash.slice(1));
    if(hash) open(hash, false);
  })
  .catch(err => {
    treeEl.innerHTML = `<div class="empty">manifest.json을 불러오지 못했습니다.<br>`
      + `GitHub Action이 한 번 이상 실행됐는지 확인하세요.<br>(${esc(String(err))})</div>`;
    $("#count").textContent = "로드 실패";
  });

window.addEventListener("hashchange", () => {
  const h = decodeURIComponent(location.hash.slice(1));
  if(h) open(h, false);
});
</script>
</body>
</html>
