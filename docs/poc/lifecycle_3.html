<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시나리오 기능 Lifecycle</title>
<style>
  :root{
    --ink:#161a1f; --paper:#f6f4ef; --panel:#ffffff; --line:#e2ddd2;
    --collect:#7c3aed; --collect-soft:#f1ebfb; --collect-line:#c9b3ec;
    --recommend:#0f766e; --recommend-soft:#e4f1ef; --recommend-line:#8fcdc4;
    --skip:#9a9a9a; --skip-soft:#f0f0f0;
    --fe:#c2410c; --fe-soft:#fdeee6; --fe-line:#e8b79a;
    --gate:#b45309;
    --advisory:#7a4bb5; --advisory-bg:#f3edfa;
    --muted:#6b6f78;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased}
  .wrap{max-width:1060px; margin:0 auto; padding:34px 24px 100px}
  header.top{border-bottom:2px solid var(--ink); padding-bottom:18px}
  .kicker{font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); font-weight:700}
  h1{font-size:27px; margin:6px 0 4px}
  .subtitle{color:var(--muted); font-size:14px}
  .def{font-size:13.5px; color:#444; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:13px 18px; margin-top:14px; line-height:1.7}

  .logbadge{margin-top:12px; font-size:12.5px; background:var(--collect-soft); border:1px solid var(--collect-line);
    border-radius:10px; padding:9px 14px; color:#5b21b6}
  .logbadge b{color:var(--collect)}

  /* 타임라인 */
  .timeline{margin-top:30px; position:relative}
  .phase-track{display:grid; grid-template-columns:1fr auto 1fr; gap:0; align-items:stretch}

  .phase{border-radius:16px; padding:20px 22px; position:relative}
  .phase.collect{background:var(--collect-soft); border:1.5px solid var(--collect-line)}
  .phase.recommend{background:var(--recommend-soft); border:1.5px solid var(--recommend-line)}
  .phase .ptag{display:inline-block; font-size:11px; font-weight:800; color:#fff; padding:4px 12px; border-radius:7px; margin-bottom:6px}
  .phase.collect .ptag{background:var(--collect)}
  .phase.recommend .ptag{background:var(--recommend)}
  .phase .pname{font-size:16px; font-weight:800; margin-bottom:4px}
  .phase.collect .pname{color:var(--collect)}
  .phase.recommend .pname{color:var(--recommend)}
  .phase .pmode{font-size:12px; color:var(--muted); margin-bottom:14px; font-weight:600}
  .phase .pbody{font-size:13px; line-height:1.7}

  .collect-items{margin-top:12px; display:flex; flex-direction:column; gap:6px}
  .ci{display:flex; align-items:center; gap:8px; font-size:12.5px; background:#fff; border:1px solid var(--collect-line); border-radius:8px; padding:6px 11px}
  .ci .cd{width:8px; height:8px; border-radius:2px; background:var(--collect); flex-shrink:0}

  .rec-out{margin-top:12px; background:#fff; border:1px solid var(--recommend-line); border-radius:10px; padding:12px 14px}
  .rec-out .rt{font-size:12px; font-weight:800; color:var(--recommend); margin-bottom:6px}
  .rec-out .rx{font-size:12.5px; color:#333}

  /* 게이트 (전환점) */
  .gate{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 18px; position:relative}
  .gate .gline{position:absolute; top:50%; left:0; right:0; height:2px; background:var(--gate); z-index:0}
  .gate .gbadge{position:relative; z-index:1; background:var(--gate); color:#fff; font-size:11px; font-weight:800;
    padding:8px 10px; border-radius:10px; text-align:center; width:96px; line-height:1.35}
  .gate .garrow{position:relative; z-index:1; color:var(--gate); font-size:20px; margin-top:6px}

  /* 결과 노출 대비 */
  .result-row{display:flex; gap:16px; margin-top:6px}
  .result-flag{font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px}
  .rf-no{background:#f0f0f0; color:#888}
  .rf-yes{background:var(--recommend-soft); color:var(--recommend); border:1px solid var(--recommend-line)}

  /* skip 분기 */
  .skip-branch{margin-top:20px; display:flex; align-items:center; gap:14px; background:var(--skip-soft);
    border:1px dashed #bbb; border-radius:12px; padding:14px 18px}
  .skip-branch .sk-tag{flex-shrink:0; font-size:12px; font-weight:800; color:#fff; background:var(--skip); padding:5px 13px; border-radius:7px}
  .skip-branch .sk-txt{font-size:13px; color:#555}
  .skip-branch .sk-txt b{color:var(--fe)}

  /* 진행형 피드백 자문 */
  .progress-note{margin-top:20px; background:#fff7ed; border:1px solid #f0c68a; border-radius:12px; padding:14px 18px; font-size:13px; color:#7a5210; line-height:1.7}
  .progress-note b{color:#b45309}

  .insight{margin-top:20px; background:var(--recommend-soft); border:1px solid var(--recommend); border-radius:12px; padding:14px 18px; font-size:13px; color:#0f5f58; line-height:1.7}
  .insight b{color:var(--recommend)}

  .adv-layer{margin:34px 0 8px}
  .layer-title{font-size:12px; letter-spacing:.16em; text-transform:uppercase; font-weight:800; padding:7px 14px; border-radius:7px; display:inline-block; margin-bottom:14px; color:#fff; background:var(--advisory)}
  .adv{border-left:4px solid var(--advisory); background:var(--advisory-bg); padding:13px 18px; border-radius:0 10px 10px 0; margin-bottom:11px}
  .adv .tag{font-size:11px; font-weight:800; color:var(--advisory); text-transform:uppercase}
  .adv .txt{font-size:14px; margin-top:5px; line-height:1.68}

  /* 정제 cycle 섹션 */
  .cycle-section{margin-top:36px; padding-top:26px; border-top:2px solid var(--ink)}
  .cycle-h{font-size:20px; margin:0 0 4px}
  .cycle-meta{font-size:13px; color:var(--muted); margin:0 0 20px; line-height:1.7}
  .cycle-combined{display:grid; grid-template-columns:1fr 260px 1fr; grid-template-rows:auto auto auto; gap:14px; align-items:center; justify-items:center; margin-top:8px}
  .cyc-fig{grid-column:2; grid-row:2; background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:8px}
  .cyc-fig svg{display:block; width:240px; height:auto}
  .cstep{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:12px 14px; position:relative; width:100%; max-width:320px}
  .cstep .cn{position:absolute; top:-11px; left:14px; width:24px; height:24px; border-radius:50%; color:#fff; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center}
  .cstep .cnm{font-size:13px; font-weight:800; margin:5px 0 4px}
  .cstep .crole{font-size:11.5px; color:#444; margin-bottom:6px}
  .cstep .ccut{font-size:11px; color:var(--gate); background:#fff7ed; border-radius:6px; padding:5px 8px; line-height:1.4}
  .cstep.s1{grid-column:2; grid-row:1} .cstep.s2{grid-column:3; grid-row:2; justify-self:start}
  .cstep.s3{grid-column:2; grid-row:3} .cstep.s4{grid-column:1; grid-row:2; justify-self:end}
  .cstep.c1{border-color:#b45309} .cstep.c1 .cn{background:#b45309} .cstep.c1 .cnm{color:#b45309}
  .cstep.c2{border-color:#a15fc4} .cstep.c2 .cn{background:#a15fc4} .cstep.c2 .cnm{color:#a15fc4}
  .cstep.c3{border-color:#7c3aed} .cstep.c3 .cn{background:#7c3aed} .cstep.c3 .cnm{color:#7c3aed}
  .cstep.c4{border-color:#0f766e} .cstep.c4 .cn{background:#0f766e} .cstep.c4 .cnm{color:#0f766e}
  .cycle-result{margin-top:16px; background:var(--recommend-soft); border:1px solid var(--recommend); border-radius:12px; padding:14px 18px; font-size:13.5px; color:#0f5f58; font-weight:600}
  @media(max-width:820px){ .cycle-combined{grid-template-columns:1fr} .cyc-fig,.cstep.s1,.cstep.s2,.cstep.s3,.cstep.s4{grid-column:1 !important; grid-row:auto !important; justify-self:center !important; max-width:420px} }
  footer{margin-top:48px; padding-top:18px; border-top:1px solid var(--line); font-size:12px; color:var(--muted)}
  @media(max-width:760px){ .phase-track{grid-template-columns:1fr} .gate{padding:14px 0}.gate .gline{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="kicker">PoC 설명자료 · 시나리오 Lifecycle</div>
    <h1>시나리오 기능 Lifecycle</h1>
    <div class="subtitle" id="subtitle"></div>
    <div class="def" id="def"></div>
    <div class="logbadge" id="logbadge"></div>
  </header>

  <!-- skip 분기 -->
  <div class="skip-branch" id="skip"></div>

  <!-- 타임라인 -->
  <div class="timeline">
    <div class="phase-track" id="track"></div>
  </div>

  <div class="progress-note" id="progress"></div>
  <div class="insight" id="insight"></div>

  <!-- 정제 cycle 섹션 -->
  <div class="cycle-section">
    <h2 class="cycle-h" id="cycleH"></h2>
    <p class="cycle-meta" id="cycleMeta"></p>
    <div class="cycle-combined" id="cycleCombined"></div>
    <div class="cycle-result" id="cycleResult"></div>
  </div>

  <div id="layers"></div>

  <footer>
    시나리오 기능은 개발/단위테스트 단계에선 결과를 내지 않고 정보를 축적하며, 통합테스트 진입 직전에 시나리오 추천으로 전환됩니다. 이로써 aTworks의 단건·비(非)시나리오 정의를 깨지 않습니다.
  </footer>
</div>

<script>
const L = {
  "meta": {
    "title": "시나리오 기능 Lifecycle",
    "subtitle": "aTworks 핵심(단건 진단)을 강화하는 support 기능의 생애주기",
    "definition": "시나리오/화면 흐름은 aTworks 핵심(단건 진단)을 풍부·강력하게 만드는 support 기능. 핵심 정의(단건, 시나리오 테스트 아님)를 깨지 않음."
  },
  "logNote": "수집 대상 로그 = application log (실제 사용 맥락). aTworks test log는 단건 진단용이라 시나리오 흐름엔 무의미.",
  "phases": [
    {
      "phase": "개발 / 단위테스트 단계",
      "behavior": "시나리오 기능은 결과를 보여주지 않고 정보 수집·분석에 집중.",
      "collects": [
        "application log",
        "화면 API 묶음",
        "화면 간 binding flow"
      ],
      "note": "화면 개발 전이면 시나리오 테스트 불필요 → skip"
    },
    {
      "phase": "통합테스트 진입 직전",
      "behavior": "축적된 정보로 \"이런 시나리오를 테스트하라\" 추천(insight) 제공. 여기서 처음 결과를 냄.",
      "output": "application log + 화면 연계 flow 기반 API 시나리오 flow 추천"
    }
  ],
  "progressFeedback": "자문 권고 — 개발 단계에도 판정 결과는 유보하되 수집 진행 상태는 노출(예: \"3개 화면 flow 후보 수집됨, 통합 시 N개 시나리오 추천 예정\"). 완전 침묵은 사용성 손해.",
  "skipBranch": "화면 개발 전 → 화면묶음·binding 없음 → 시나리오 추천 근거 없음 → SKIP",
  "collectItems": [
    "application log",
    "화면 API 묶음",
    "화면 간 binding flow"
  ],
  "insight": "API 흐름 정합률(화면 흐름과 매칭되는 비율)이 통합 전 시나리오 추천의 핵심 근거. 호출 양이 아니라 정합이 지표.",
  "refineCycle": {
    "title": "정보 상호보완 정제 Cycle",
    "metaphor": "각진 바위(거친 API 흐름)를 반복적으로 깎아 매끄러운 구(신뢰도 높은 시나리오 후보)로 다듬는 과정",
    "steps": [
      {
        "n": 1,
        "name": "application log 수집",
        "role": "원시 API 흐름 확보",
        "cut": "아직 노이즈·미검증 흐름 (각진 바위)"
      },
      {
        "n": 2,
        "name": "화면 API 묶음 대조",
        "role": "API가 어느 화면 소속인지 매핑",
        "cut": "화면에 없는 API(노이즈) 깎여나감"
      },
      {
        "n": 3,
        "name": "화면 간 binding flow 대조",
        "role": "화면 연계 흐름과 시퀀스 매칭",
        "cut": "화면 흐름과 안 맞는 순서 다듬어짐"
      },
      {
        "n": 4,
        "name": "반복 누적 → 정합도 상승",
        "role": "로그가 쌓일수록 정합 패턴 선명",
        "cut": "예외 줄고 매끄러워짐 (구에 근접)"
      }
    ],
    "result": "회전할수록 정합률↑ 노이즈↓ → 통합테스트에 쓸 신뢰도 높은 시나리오 후보로 수렴",
    "stages": [
      "각진 바위",
      "다듬는 중",
      "거의 구",
      "매끄러운 구"
    ]
  }
};

document.getElementById('subtitle').textContent = L.meta.subtitle;
document.getElementById('def').textContent = L.meta.definition;
document.getElementById('logbadge').innerHTML = `<b>📌 수집 로그</b> · ${L.logNote}`;

// skip 분기
document.getElementById('skip').innerHTML =
  `<span class="sk-tag">SKIP 조건</span><span class="sk-txt">${L.skipBranch}</span>`;

// 타임라인 (수집 → 게이트 → 추천)
const p1 = L.phases[0], p2 = L.phases[1];
const track = document.getElementById('track');

// 수집 phase
let collectHtml = `<div class="phase collect">
  <span class="ptag">PHASE 1</span>
  <div class="pname">${p1.phase}</div>
  <div class="pmode">모드: 정보 수집·분석 (결과 미제공)</div>
  <div class="pbody">${p1.behavior}</div>
  <div class="collect-items">
    ${p1.collects.map(c=>`<div class="ci"><span class="cd"></span>${c}</div>`).join('')}
  </div>
  <div class="result-row"><span class="result-flag rf-no">결과 노출 ✕ (유보)</span></div>
</div>`;

// 게이트
let gateHtml = `<div class="gate">
  <div class="gline"></div>
  <div class="gbadge">통합테스트<br>진입 직전</div>
  <div class="garrow">▶</div>
</div>`;

// 추천 phase
let recHtml = `<div class="phase recommend">
  <span class="ptag">PHASE 2</span>
  <div class="pname">${p2.phase}</div>
  <div class="pmode">모드: 시나리오 추천 (첫 결과)</div>
  <div class="pbody">${p2.behavior}</div>
  <div class="rec-out">
    <div class="rt">▶ OUTPUT</div>
    <div class="rx">${p2.output}</div>
  </div>
  <div class="result-row"><span class="result-flag rf-yes">결과 노출 ○ (추천 insight)</span></div>
</div>`;

track.innerHTML = collectHtml + gateHtml + recHtml;

// 진행형 피드백 (자문)
document.getElementById('progress').innerHTML =
  `<b>⚙ 자문 · 진행형 피드백:</b> ${L.progressFeedback}`;

// 인사이트
document.getElementById('insight').innerHTML =
  `<b>💡 통합 전 추천의 근거:</b> ${L.insight}`;

/* ===== 정제 Cycle 렌더 ===== */
const RC = L.refineCycle;
document.getElementById('cycleH').textContent = RC.title;
document.getElementById('cycleMeta').textContent = RC.metaphor;

/* 순환도 + 4단계 카드 통합 (십자 배치) */
(function(){
  const W=240, Hs=240, cx=W/2, cy=Hs/2, R=80;
  const stepColors=['#b45309','#a15fc4','#7c3aed','#0f766e'];
  let svg=`<svg viewBox="0 0 ${W} ${Hs}" xmlns="http://www.w3.org/2000/svg" font-family="inherit">
    <defs>
      <marker id="cyAr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c9b3ec"/></marker>
      <radialGradient id="sphere" cx="38%" cy="34%" r="70%">
        <stop offset="0%" stop-color="#5eead4"/><stop offset="60%" stop-color="#0f766e"/><stop offset="100%" stop-color="#0a544e"/>
      </radialGradient>
    </defs>`;
  const N=4, nodes=[];
  for(let i=0;i<N;i++){ const ang=-Math.PI/2+i*(2*Math.PI/N); nodes.push({x:cx+R*Math.cos(ang), y:cy+R*Math.sin(ang), ang}); }
  for(let i=0;i<N;i++){
    const a1=Math.atan2(nodes[i].y-cy,nodes[i].x-cx), a2=Math.atan2(nodes[(i+1)%N].y-cy,nodes[(i+1)%N].x-cx);
    const sx=cx+R*Math.cos(a1+0.55), sy=cy+R*Math.sin(a1+0.55);
    const ex=cx+R*Math.cos(a2-0.55), ey=cy+R*Math.sin(a2-0.55);
    svg+=`<path d="M ${sx} ${sy} A ${R} ${R} 0 0 1 ${ex} ${ey}" fill="none" stroke="#c9b3ec" stroke-width="2.5" marker-end="url(#cyAr)"/>`;
  }
  svg+=`<polygon points="${cx-28},${cy-19} ${cx-7},${cy-30} ${cx+19},${cy-23} ${cx+28},${cy+3} ${cx+13},${cy+25} ${cx-13},${cy+26} ${cx-30},${cy+7}" fill="#d9c9a8" stroke="#b08d57" stroke-width="1.5" opacity="0.35"/>`;
  svg+=`<circle cx="${cx}" cy="${cy}" r="26" fill="url(#sphere)"/>`;
  svg+=`<text x="${cx}" y="${cy-1}" text-anchor="middle" font-size="10" font-weight="800" fill="#fff">정제</text>`;
  svg+=`<text x="${cx}" y="${cy+11}" text-anchor="middle" font-size="7.5" fill="#d5f0ea">바위→구</text>`;
  nodes.forEach((n,i)=>{
    const col=stepColors[i];
    svg+=`<circle cx="${n.x}" cy="${n.y}" r="21" fill="#fff" stroke="${col}" stroke-width="2.5"/>`;
    svg+=`<text x="${n.x}" y="${n.y+6}" text-anchor="middle" font-size="15" font-weight="800" fill="${col}">${i+1}</text>`;
  });
  svg+=`</svg>`;
  const cards = RC.steps.map((s,i)=>`
    <div class="cstep s${i+1} c${i+1}">
      <div class="cn">${i+1}</div>
      <div class="cnm">${s.name}</div>
      <div class="crole">${s.role}</div>
      <div class="ccut">🪨→⚪ ${s.cut}</div>
    </div>`).join('');
  document.getElementById('cycleCombined').innerHTML = cards + `<div class="cyc-fig">${svg}</div>`;
})();

/* 결과 */
document.getElementById('cycleResult').innerHTML = `⚪ ${RC.result}`;
</script>
</body>
</html>
